name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - fixtures/**
      - .github/workflows/**
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - fixtures/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

# Prefer Node.js 24 for JS-based actions (checkout/cache/etc).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # CI focuses on primary desktop targets; Linux ARM is covered in release builds.
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # GPUI/Zed desktop deps + C++ toolchain for unrar_sys
          sudo apt-get install -y \
            build-essential \
            g++ \
            pkg-config \
            cmake \
            clang \
            lld \
            llvm \
            libasound2-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libglib2.0-dev \
            libssl-dev \
            libsqlite3-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        shell: bash
        run: cargo test --locked --bin pass_smash --verbose
